<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINP</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <main class="flex flex-col-reverse sm:flex-row font-inter">
        <aside class="flex flex-col bg-black h-dvh w-dvw items-center justify-center gap-28">

            <figure>
                <img src="./images/fimp.png" alt="Logomarca da instituição FIMP" class="w-sm sm:w-md">
            </figure>

            <h1 class="text-white text-8xl sm:text-9xl font-bold">FIMP</h1>

        </aside>

        <section class="flex flex-col gap-12 items-center justify-center bg-[#F7F7F7] w-dvw h-dvh rounded-2xl">

            <figure>
                <img src="./images/fimp_topo.png" alt="Logo fimp posicionado na diagonal" class="hidden sm:block sm:absolute sm:top-0 sm:right-0 sm:max-w-lg z-0">
            </figure>

            <header>
                <h2 class="text-black text-5xl sm:text-7xl font-bold mt-20 Z-1">Boas Vindas!</h2>
            </header>

            <form class="flex flex-col items-center gap-9 Z-1" action="submit">

                <label for="" class="flex flex-col text-lg sm:text-2xl font-medium gap-3.5"> E-mail
                    <input type="email" name="" id="" class="rounded-2xl border-2 border-gray-300 w-80 sm:w-md h-16 bg-white bg-neutral-secondary-medium border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="professor@fiap.com">
                </label>

                <label for="" class="flex flex-col text-lg sm:text-2xl font-medium gap-3.5"> Senha <br>
                    <input type="password" name="" id="" class="rounded-2xl border-2 border-gray-300 w-80 sm:w-md h-16 bg-white bg-neutral-secondary-medium  border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="•••••••••">
                </label>

                <button type="button" class="bg-black text-white rounded-2xl text-lg sm:text-2xl font-medium pt-4 pb-4 sm:pl-48 sm:pr-48 pl-32 pr-32 cursor-pointer z-1 hover:bg-[#D8B600]/90 focus:outline-none hover:text-black ">Entrar</button>

            </form>

            <nav class="flex flex-col items-center gap-9 z-1">
                <a href="" class="text-lg sm:text-2xl font-normal hover:text-[#D8B600]">Esqueceu a senha?</a>
                <span class="text-lg sm:text-2xl font-normal">Não tem uma conta? <a href="" class="hover:text-black font-extrabold text-[#D8B600]">Criar conta</a></span>
            </nav>

            <figure>
                <img src="./images/fimp_base.png" alt="Logo fimp posicionado na diagonal" class="-mt-25 sm:fixed sm:bottom-0 sm:left-2/4 sm:max-w- z-0">
            </figure>

        </section>
    </main>
</body>

</html>
